# ============================================================
# 快递单 OCR 默认配置
# ============================================================
# 如需覆盖，复制本文件为 config/local.yaml 并修改对应值
# local.yaml 中只需写要覆盖的字段，其余自动使用 default.yaml 的值

# ------ YOLO 分割模型 ------
yolo:
  model_path: "models/yolo/best.onnx"
  conf_threshold: 0.5
  iou_threshold: 0.7
  device: "cpu"          # "cpu" 或 "0"(GPU)
  imgsz: 960             # ONNX 导出时的输入尺寸
  auto_install: false    # 禁止 ultralytics 自动安装缺失依赖（如 onnxruntime-gpu）

# ------ 透视校正 ------
rectifier:
  epsilon_ratio: 0.02
  use_convex_hull: true
  morph_size: 7

# ------ 图像预处理 ------
preprocessing:
  enabled: true                    # 是否启用预处理（推荐开启以提升 OCR 质量）
  mode: "auto"                     # 预处理模式："auto"（自动）、"custom"（自定义）、"off"（关闭）
  enhance_contrast: true           # 对比度增强（CLAHE）
  denoise: true                    # 去噪处理
  sharpen: false                   # 锐化处理（低质量图像可开启）
  adjust_brightness: false         # 亮度调整（过暗/过亮图像可开启）
  binarize: false                  # 二值化（可能损失颜色信息，谨慎使用）
  contrast_clip_limit: 2.0         # CLAHE 对比度限制（1.0-4.0，推荐 2.0-2.5）
  denoise_strength: 7              # 去噪强度（3-15，推荐 5-10）
  sharpen_strength: 0.5            # 锐化强度（0.3-2.0，推荐 0.5-1.0）
  target_brightness: 130           # 目标亮度（100-150，推荐 120-140）

# ------ PaddleOCR ------
ocr:
  model_dir: "models/paddleocr"  # 模型存放根目录（det/rec/cls 子目录自动创建）
  use_angle_cls: true
  lang: "ch"
  use_gpu: false
  det_db_thresh: 0.2          # 文本区域检测阈值（降低可检测更多模糊/遮挡文字）
  det_db_box_thresh: 0.4      # 文本框置信度阈值（降低可保留更多候选框）
  det_db_unclip_ratio: 1.8    # 文本框扩展系数（增大可合并被遮挡断裂的文字）
  orientation_thumbnail_size: 640

# ------ 输出 ------
output:
  dir: "output"
  save_debug_images: true
